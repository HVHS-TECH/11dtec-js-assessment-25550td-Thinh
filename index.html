<!DOCTYPE html>
<html>
<head>
 <title>One More Sip</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <img src="image/cafeTask.png" id="banner">
 
    <main class="container">

        <section class="menu-section">

            <div class="menu-box">
                <img src="images/coffee-menu.png" alt="Coffee Menu">

                <div class="menu-buttons">
                    <button onclick="selectItem('Caramel Latte', 4.50)">
                        Caramel Latte
                    </button>

                    <button onclick="selectItem('Iced Coffee', 3.90)">
                        Iced Coffee
                    </button>

                    <button onclick="selectItem('Cappuccino', 4.20)">
                        Cappuccino
                    </button>

                    <button onclick="selectItem('Americano', 3.50)">
                        Americano
                    </button>
                </div>
            </div>

            <!-- Sweet Treats -->
            <div class="menu-box">
                <img src="images/sweet-menu.png" alt="Sweet Treats Menu">

                <div class="menu-buttons">
                    <button onclick="selectItem('New York Cheesecake', 4.80)">
                        New York Cheesecake
                    </button>

                    <button onclick="selectItem('Chocolate Cake', 4.50)">
                        Chocolate Cake
                    </button>

                    <button onclick="selectItem('Lemon Tart', 4.30)">
                        Lemon Tart
                    </button>

                    <button onclick="selectItem('Blueberry Muffin', 3.20)">
                        Blueberry Muffin
                    </button>
                </div>
            </div>

            <!-- Special -->
            <div class="menu-box special-box">
                <img src="images/special-menu.png" alt="Today's Special">

                <div class="menu-buttons">
                    <button onclick="selectItem('Nuggets & Fries', 6.90)">
                        Nuggets & Fries
                    </button>
                </div>
            </div>

        </section>


        <!-- Right Side -->
        <aside class="order-panel">

            <h2>Order Panel</h2>

            <label>Name:</label>
            <input
                type="text"
                id="itemName"
                readonly
            >

            <label>Amount:</label>
            <input
                type="number"
                id="amount"
                min="1"
                value="1"
            >

            <button
                class="add-btn"
                onclick="addToOrder()">
                Add to Order
            </button>

            <h3>Checklist</h3>

            <ul id="checklist">

            </ul>

            <div class="summary">

                <p>
                    Total:
                    <span id="total">
                        $0.00
                    </span>
                </p>

                <label>Money:</label>

                <input
                    type="number"
                    id="money"
                    placeholder="Customer money"
                    min="0"
                    step="0.01"
                >

                <button
                    class="place-btn"
                    onclick="placeOrder()">
                    Place Order !!!
                </button>

                <p>
                    Change:
                    <span id="change">
                        $0.00
                    </span>
                </p>

                <p id="message">

                </p>

            </div>

        </aside>

    </main>

    <script src="script.js"></script>

</body>
</html>
